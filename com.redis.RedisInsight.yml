app-id: com.redis.RedisInsight
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: redisinsight
separate-locales: false
finish-args:
  - --device=dri
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --filesystem=home
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
modules:
  - name: redis insight
    buildsystem: simple
    build-commands:
      - chmod +x RedisInsight.AppImage
      - ./RedisInsight.AppImage --appimage-extract

      - desktop-file-edit --set-icon ${FLATPAK_ID} --set-key Exec --set-value 'redisinsight
        %u' squashfs-root/redisinsight.desktop
      - install -Dm644 squashfs-root/redisinsight.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop

      - install -Dm755 redisinsight.sh ${FLATPAK_DEST}/bin/redisinsight
      - install -Dm644 com.redis.RedisInsight.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml

      - |
        for IMG_SIZE in 16 24 32 48 64 128 256 512; do
            IMG_NAME=${IMG_SIZE}x${IMG_SIZE}
            install -Dm644 squashfs-root/usr/share/icons/hicolor/${IMG_NAME}/apps/redisinsight.png ${FLATPAK_DEST}/share/icons/hicolor/${IMG_NAME}/apps/${FLATPAK_ID}.png
        done

      - mv squashfs-root ${FLATPAK_DEST}/redisinsight
    sources:
      - type: file
        only-arches: [x86_64]
        url: https://download.redisinsight.redis.com/latest-v3/Redis-Insight-linux-x86_64.AppImage
        sha512: 5fc04e3c879b72d3ad17e8ddeb8363d8a8e5d6c010688fb7002f1542b269a84d1c366a09516382ba24b30d413f7b1986e778252556f40d0e1bda6e2cf566abd9
        dest_filename: RedisInsight.AppImage
        x-checker-data:
          type: rotating-url
          url: https://download.redisinsight.redis.com/latest-v3/Redis-Insight-linux-x86_64.AppImage
          pattern: https://download.redisinsight.redis.com/latest-v3/Redis-Insight-linux-x86_64.AppImage

      - type: file
        only-arches: [aarch64]
        url: https://download.redisinsight.redis.com/latest-v3/Redis-Insight-linux-arm64.AppImage
        sha512: 211955863e8b30d3622896c66f8a86990aab6d9081456354f6d753547300ed7bd19db3c47472c149962748baa82b506a29cf0044745634139787ac71bcd03482
        dest_filename: RedisInsight.AppImage
        x-checker-data:
          type: rotating-url
          url: https://download.redisinsight.redis.com/latest-v3/Redis-Insight-linux-arm64.AppImage
          pattern: https://download.redisinsight.redis.com/latest-v3/Redis-Insight-linux-arm64.AppImage

      - type: file
        path: redisinsight.sh

      - type: file
        path: com.redis.RedisInsight.metainfo.xml
